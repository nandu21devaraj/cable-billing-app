<!DOCTYPE html>
<html>
<head>
    <title>Receipt</title>

    <style>
        body {
            font-family: Arial;
        }

        .bill {
            width: 420px;
            border: 4px solid #000;
            padding: 12px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 40px;
        }

        .title {
            text-align: center;
            font-weight: bold;
            font-size: 22px;
        }

        .sub {
            text-align: center;
            font-size: 13px;
        }

        .number {
            color: red;
            font-size: 32px;
            font-weight: bold;
        }

        .field {
            margin-top: 10px;
            font-size: 14px;
        }

        .line {
            border-bottom: 1px dotted #000;
            display: inline-block;
            width: 220px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
        }

        .print-btn {
            margin-top: 15px;
        }

        @media print {
            .print-btn {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="bill">

    <!-- TOP SECTION -->
    <div class="top">
        <div class="logo">📡</div>

        <div>
            <div class="title">ನಂದು ಕೇಬಲ್ ನೆಟ್ವರ್ಕ್</div>
            <div class="sub">Cable TV Network</div>
        </div>

        <div class="number">{{ bill_number }}</div>
    </div>

    <!-- CONTACT -->
    <div class="field">
        📞 9448264618, 9141464588
    </div>

    <!-- DETAILS -->
    <div class="field">
        ದಿನಾಂಕ: {{ date }}
    </div>

    <div class="field">
        ಕಾರ್ಡ್ ನಂ: <span class="line">{{ customer.card_number }}</span>
    </div>

    <div class="field">
        STB No: <span class="line">{{ customer.stb_number }}</span>
    </div>

    <div class="field">
        ತಿಂಗಳು: <span class="line">{{ month }} {{ year }}</span>
    </div>

    <div class="field">
        ಪಾವತಿ: ₹{{ payment.paid_amount }}
    </div>

    <div class="field">
        ಬಾಕಿ: ₹{{ payment.balance }}
    </div>

    <div class="field">
        ಸ್ಥಿತಿ: {{ payment.status }}
    </div>

    <!-- TEMPLE ICON -->
    <div class="footer">
        🛕
    </div>

</div>

<button class="print-btn" onclick="window.print()">🖨 Print</button>

</body>
</html>
