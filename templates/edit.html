<!DOCTYPE html>
<html>
<head>
    <title>Edit Monthly Amount</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width:600px;">

        <h3 class="mb-4 text-center">Edit Monthly Amount</h3>

        <div class="mb-3">
            <strong>Card Number:</strong>
            <span class="badge bg-dark">{{ customer.card_number }}</span>
        </div>

        <div class="mb-3">
            <strong>STB Number:</strong>
            <span class="badge bg-secondary">{{ customer.stb_number }}</span>
        </div>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">New Monthly Amount</label>
                <input type="number"
                       name="monthly_amount"
                       class="form-control"
                       value="{{ customer.monthly_amount }}"
                       required>
            </div>

            <button type="submit" class="btn btn-primary">
                Update Amount
            </button>

            <a href="/admin" class="btn btn-secondary ms-2">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
